    <rect x="1050" y="760" width="180" height="120" fill="#E67E22" stroke="none" rx="8" filter="url(#shadow)"/>
    <text x="1140" y="795" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Monitoring</text>
    <text x="1140" y="820" font-size="11" text-anchor="middle" fill="white">Sentry</text>
    <text x="1140" y="840" font-size="11" text-anchor="middle" fill="white">Prometheus</text>
    <text x="1140" y="860" font-size="11" text-anchor="middle" fill="white">Actuator</text>
