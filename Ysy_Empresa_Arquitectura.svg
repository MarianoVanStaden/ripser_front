    <text x="220" y="820" font-size="12" text-anchor="middle" fill="white">MariaDB</text>
    <text x="220" y="845" font-size="10" text-anchor="middle" fill="white">70+ Migrations</text>
    <text x="220" y="865" font-size="10" text-anchor="middle" fill="white">122 Entities</text>

