      <text x="1083" y="520" font-size="9" text-anchor="middle" fill="#666">Cuotas, Refinanc.</text>

      <rect x="1152" y="480" width="98" height="55" fill="#FFF5E6" stroke="#FFD93D" stroke-width="2" rx="6" filter="url(#shadow)"/>
      <text x="1201" y="500" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Admin</text>
      <text x="1201" y="520" font-size="9" text-anchor="middle" fill="#666">Usuarios, Roles</text>
