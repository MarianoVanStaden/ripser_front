    <rect x="840" y="760" width="180" height="120" fill="#2ECC71" stroke="none" rx="8" filter="url(#shadow)"/>
    <text x="930" y="795" font-size="14" font-weight="bold" text-anchor="middle" fill="white">DevOps</text>
    <text x="930" y="820" font-size="11" text-anchor="middle" fill="white">Docker</text>
    <text x="930" y="840" font-size="11" text-anchor="middle" fill="white">CI/CD (GitHub)</text>
    <text x="930" y="860" font-size="11" text-anchor="middle" fill="white">Cloud Deploy</text>

