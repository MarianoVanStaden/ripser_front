  <text x="700" y="1010" font-size="11" text-anchor="middle" fill="#666" font-family="Segoe UI">
    Ysy Empresa: Trazabilidad End-to-End • Motor Inteligente de Stock • Arquitectura Multi-Tenant • Implementación Rápida
