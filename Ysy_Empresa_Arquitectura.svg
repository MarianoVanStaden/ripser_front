    <text x="155" y="185" font-size="10" text-anchor="middle" fill="white">TypeScript</text>
    <text x="155" y="205" font-size="10" text-anchor="middle" fill="white">Vite</text>

    <rect x="250" y="135" width="130" height="90" fill="url(#grad2)" stroke="none" rx="8" filter="url(#shadow)"/>
    <text x="315" y="165" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Material-UI</text>
    <text x="315" y="185" font-size="10" text-anchor="middle" fill="white">React Router</text>
    <text x="315" y="205" font-size="10" text-anchor="middle" fill="white">React Query</text>

    <rect x="410" y="135" width="130" height="90" fill="url(#grad2)" stroke="none" rx="8" filter="url(#shadow)"/>
    <text x="475" y="165" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Módulos</text>
    <text x="475" y="185" font-size="10" text-anchor="middle" fill="white">CRM, Ventas</text>
    <text x="475" y="205" font-size="10" text-anchor="middle" fill="white">Stock, Logística</text>

