    <text x="700" y="795" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Query Engine</text>
    <text x="700" y="820" font-size="12" text-anchor="middle" fill="white">Caching &amp;</text>
    <text x="700" y="845" font-size="10" text-anchor="middle" fill="white">Optimization</text>
    <text x="700" y="865" font-size="10" text-anchor="middle" fill="white">Indexing</text>

