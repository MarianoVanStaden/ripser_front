      <text x="847" y="520" font-size="9" text-anchor="middle" fill="#666">Cajas, Bancos</text>

      <rect x="916" y="480" width="98" height="55" fill="#FFF5E6" stroke="#FFD93D" stroke-width="2" rx="6" filter="url(#shadow)"/>
