    <text x="162" y="380" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Java 21</text>
    <text x="162" y="400" font-size="10" text-anchor="middle" fill="white">Spring Boot</text>
    <text x="162" y="420" font-size="10" text-anchor="middle" fill="white">Virtual Threads</text>

    <rect x="265" y="350" width="145" height="85" fill="#4ECDC4" stroke="none" rx="8" filter="url(#shadow)"/>
    <text x="337" y="380" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Controllers</text>
