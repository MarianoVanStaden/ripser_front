<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f9f9f9"/>

  <!-- Title -->
  <text x="600" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="#2E75B6">
    YSY Software - Arquitectura Tecnica
  </text>

  <!-- Layer 1: Presentation Layer (Frontend) -->
  <g id="frontend-layer">
    <rect x="50" y="80" width="1100" height="140" fill="#E7F0F7" stroke="#2E75B6" stroke-width="2" rx="8"/>
    <text x="60" y="105" font-size="16" font-weight="bold" fill="#2E75B6">Presentation Layer (Frontend)</text>

    <!-- Frontend Components -->
    <rect x="80" y="125" width="140" height="80" fill="#2E75B6" stroke="#1a4d7f" stroke-width="2" rx="4"/>
    <text x="150" y="160" font-size="13" font-weight="bold" text-anchor="middle" fill="white">React 19.1</text>
    <text x="150" y="180" font-size="11" text-anchor="middle" fill="white">TypeScript</text>
    <text x="150" y="195" font-size="11" text-anchor="middle" fill="white">Vite</text>

    <rect x="260" y="125" width="140" height="80" fill="#2E75B6" stroke="#1a4d7f" stroke-width="2" rx="4"/>
    <text x="330" y="160" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Material-UI</text>
    <text x="330" y="180" font-size="11" text-anchor="middle" fill="white">React Router</text>
    <text x="330" y="195" font-size="11" text-anchor="middle" fill="white">React Query</text>

    <rect x="440" y="125" width="140" height="80" fill="#2E75B6" stroke="#1a4d7f" stroke-width="2" rx="4"/>
    <text x="510" y="160" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Modulos</text>
    <text x="510" y="180" font-size="11" text-anchor="middle" fill="white">CRM, Ventas</text>
    <text x="510" y="195" font-size="11" text-anchor="middle" fill="white">Stock, Logistica</text>

    <rect x="620" y="125" width="140" height="80" fill="#2E75B6" stroke="#1a4d7f" stroke-width="2" rx="4"/>
    <text x="690" y="160" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Exportacion</text>
    <text x="690" y="180" font-size="11" text-anchor="middle" fill="white">PDF, Excel</text>
    <text x="690" y="195" font-size="11" text-anchor="middle" fill="white">QR, Charts</text>

    <rect x="800" y="125" width="140" height="80" fill="#2E75B6" stroke="#1a4d7f" stroke-width="2" rx="4"/>
    <text x="870" y="160" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Monitoreo</text>
    <text x="870" y="180" font-size="11" text-anchor="middle" fill="white">Sentry</text>
    <text x="870" y="195" font-size="11" text-anchor="middle" fill="white">Error Tracking</text>

    <rect x="980" y="125" width="140" height="80" fill="#2E75B6" stroke="#1a4d7f" stroke-width="2" rx="4"/>
    <text x="1050" y="160" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Auth Context</text>
    <text x="1050" y="180" font-size="11" text-anchor="middle" fill="white">JWT Tokens</text>
    <text x="1050" y="195" font-size="11" text-anchor="middle" fill="white">Multi-Tenant</text>
  </g>

  <!-- Connection -->
  <line x1="600" y1="220" x2="600" y2="250" stroke="#666" stroke-width="3"/>
  <polygon points="600,260 595,250 605,250" fill="#666"/>

  <!-- Layer 2: Application Layer (Backend) -->
  <g id="backend-layer">
    <rect x="50" y="260" width="1100" height="280" fill="#F0F5F9" stroke="#2E75B6" stroke-width="2" rx="8"/>
    <text x="60" y="285" font-size="16" font-weight="bold" fill="#2E75B6">Application Layer (Backend)</text>

    <!-- Backend Core Stack -->
    <rect x="80" y="305" width="160" height="70" fill="#FF6B6B" stroke="#c92a2a" stroke-width="2" rx="4"/>
    <text x="160" y="330" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Java 21</text>
    <text x="160" y="350" font-size="11" text-anchor="middle" fill="white">Spring Boot 3.2</text>
    <text x="160" y="365" font-size="11" text-anchor="middle" fill="white">Virtual Threads</text>

    <!-- Controllers & Services -->
    <rect x="280" y="305" width="160" height="70" fill="#4ECDC4" stroke="#0c8d7e" stroke-width="2" rx="4"/>
    <text x="360" y="330" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Controllers</text>
    <text x="360" y="350" font-size="11" text-anchor="middle" fill="white">104 REST APIs</text>
    <text x="360" y="365" font-size="11" text-anchor="middle" fill="white">Services (110)</text>

    <!-- Security & Multi-tenancy -->
    <rect x="480" y="305" width="160" height="70" fill="#95E1D3" stroke="#2c8c76" stroke-width="2" rx="4"/>
    <text x="560" y="330" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Security</text>
    <text x="560" y="350" font-size="11" text-anchor="middle" fill="white">JWT + Spring Sec</text>
    <text x="560" y="365" font-size="11" text-anchor="middle" fill="white">RBAC / Multi-Tenant</text>

    <!-- ORM & Data Mapping -->
    <rect x="680" y="305" width="160" height="70" fill="#A8DADC" stroke="#457b9d" stroke-width="2" rx="4"/>
    <text x="760" y="330" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Data Layer</text>
    <text x="760" y="350" font-size="11" text-anchor="middle" fill="white">Spring Data JPA</text>
    <text x="760" y="365" font-size="11" text-anchor="middle" fill="white">Hibernate / 122 Entities</text>

    <!-- Utilities & Monitoring -->
    <rect x="880" y="305" width="160" height="70" fill="#F1FAEE" stroke="#1d3557" stroke-width="2" rx="4"/>
    <text x="960" y="330" font-size="13" font-weight="bold" text-anchor="middle" fill="#1d3557">Utilities</text>
    <text x="960" y="350" font-size="11" text-anchor="middle" fill="#1d3557">MapStruct, Jackson</text>
    <text x="960" y="365" font-size="11" text-anchor="middle" fill="#1d3557">Validation, AOP</text>

    <!-- Domain Modules - Row 1 -->
    <text x="90" y="410" font-size="12" font-weight="bold" fill="#2E75B6">Modulos de Negocio:</text>

    <rect x="90" y="425" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="140" y="445" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">CRM</text>
    <text x="140" y="465" font-size="9" text-anchor="middle" fill="#333">Clientes, Leads</text>

    <rect x="210" y="425" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="260" y="445" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Ventas</text>
    <text x="260" y="465" font-size="9" text-anchor="middle" fill="#333">Facturas, Presup.</text>

    <rect x="330" y="425" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="380" y="445" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Fabricacion</text>
    <text x="380" y="465" font-size="9" text-anchor="middle" fill="#333">Recetas, Ordenes</text>

    <rect x="450" y="425" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="500" y="445" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Stock</text>
    <text x="500" y="465" font-size="9" text-anchor="middle" fill="#333">Motor Inteligente</text>

    <rect x="570" y="425" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="620" y="445" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Logistica</text>
    <text x="620" y="465" font-size="9" text-anchor="middle" fill="#333">Viajes, Entregas</text>

    <rect x="690" y="425" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="740" y="445" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">RRHH</text>
    <text x="740" y="465" font-size="9" text-anchor="middle" fill="#333">Empleados, Sueldos</text>

    <rect x="810" y="425" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="860" y="445" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Finanzas</text>
    <text x="860" y="465" font-size="9" text-anchor="middle" fill="#333">Cajas, Bancos</text>

    <rect x="930" y="425" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="980" y="445" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Proveedores</text>
    <text x="980" y="465" font-size="9" text-anchor="middle" fill="#333">Compras, Eval.</text>

    <!-- Domain Modules - Row 2 -->
    <rect x="210" y="500" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="260" y="520" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Prestamos</text>
    <text x="260" y="540" font-size="9" text-anchor="middle" fill="#333">Cuotas, Refinanc.</text>

    <rect x="330" y="500" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="380" y="520" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Garantias</text>
    <text x="380" y="540" font-size="9" text-anchor="middle" fill="#333">Reclamos</text>

    <rect x="450" y="500" width="100" height="50" fill="#FFD93D" stroke="#e6b800" stroke-width="1" rx="4"/>
    <text x="500" y="520" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Admin</text>
    <text x="500" y="540" font-size="9" text-anchor="middle" fill="#333">Usuarios, Roles</text>
  </g>

  <!-- Connection -->
  <line x1="600" y1="540" x2="600" y2="570" stroke="#666" stroke-width="3"/>
  <polygon points="600,580 595,570 605,570" fill="#666"/>

  <!-- Layer 3: Database Layer -->
  <g id="database-layer">
    <rect x="50" y="580" width="1100" height="280" fill="#F5F5F5" stroke="#2E75B6" stroke-width="2" rx="8"/>
    <text x="60" y="605" font-size="16" font-weight="bold" fill="#2E75B6">Data Layer &amp; Infrastructure</text>

    <!-- Database -->
    <rect x="150" y="640" width="200" height="100" fill="#E74C3C" stroke="#c0392b" stroke-width="2" rx="4"/>
    <text x="250" y="670" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Database</text>
    <text x="250" y="690" font-size="12" text-anchor="middle" fill="white">MariaDB</text>
    <text x="250" y="710" font-size="11" text-anchor="middle" fill="white">Flyway Migrations (70+)</text>
    <text x="250" y="730" font-size="11" text-anchor="middle" fill="white">122 Entities</text>

    <!-- Connection Pool -->
    <rect x="420" y="640" width="180" height="100" fill="#9B59B6" stroke="#8e44ad" stroke-width="2" rx="4"/>
    <text x="510" y="670" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Connection Pool</text>
    <text x="510" y="690" font-size="12" text-anchor="middle" fill="white">HikariCP</text>
    <text x="510" y="710" font-size="11" text-anchor="middle" fill="white">Min: 5 / Max: 20</text>
    <text x="510" y="730" font-size="11" text-anchor="middle" fill="white">High Performance</text>

    <!-- Caching &amp; Indexing -->
    <rect x="690" y="640" width="180" height="100" fill="#3498DB" stroke="#2980b9" stroke-width="2" rx="4"/>
    <text x="780" y="670" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Caching</text>
    <text x="780" y="690" font-size="12" text-anchor="middle" fill="white">Query Optimization</text>
    <text x="780" y="710" font-size="11" text-anchor="middle" fill="white">JPA Specifications</text>
    <text x="780" y="730" font-size="11" text-anchor="middle" fill="white">Strategic Indexing</text>

    <!-- DevOps &amp; Deployment -->
    <g id="devops">
      <text x="90" y="780" font-size="12" font-weight="bold" fill="#2E75B6">DevOps &amp; Deployment:</text>

      <rect x="90" y="800" width="120" height="60" fill="#2ECC71" stroke="#27AE60" stroke-width="2" rx="4"/>
      <text x="150" y="825" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Docker</text>
      <text x="150" y="845" font-size="10" text-anchor="middle" fill="white">Multi-stage Build</text>

      <rect x="240" y="800" width="120" height="60" fill="#2ECC71" stroke="#27AE60" stroke-width="2" rx="4"/>
      <text x="300" y="825" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CI/CD</text>
      <text x="300" y="845" font-size="10" text-anchor="middle" fill="white">GitHub Actions</text>

      <rect x="390" y="800" width="120" height="60" fill="#2ECC71" stroke="#27AE60" stroke-width="2" rx="4"/>
      <text x="450" y="825" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Cloud</text>
      <text x="450" y="845" font-size="10" text-anchor="middle" fill="white">AWS / Azure</text>

      <rect x="540" y="800" width="120" height="60" fill="#E67E22" stroke="#d35400" stroke-width="2" rx="4"/>
      <text x="600" y="825" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Monitoring</text>
      <text x="600" y="845" font-size="10" text-anchor="middle" fill="white">Sentry, Prometheus</text>

      <rect x="690" y="800" width="120" height="60" fill="#34495E" stroke="#2c3e50" stroke-width="2" rx="4"/>
      <text x="750" y="825" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Testing</text>
      <text x="750" y="845" font-size="10" text-anchor="middle" fill="white">JUnit, Testcontainers</text>

      <rect x="840" y="800" width="140" height="60" fill="#34495E" stroke="#2c3e50" stroke-width="2" rx="4"/>
      <text x="910" y="825" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Multi-Tenancy</text>
      <text x="910" y="845" font-size="10" text-anchor="middle" fill="white">Data Isolation / RBAC</text>
    </g>
  </g>

  <!-- Legend -->
  <g id="legend" opacity="0.8">
    <text x="60" y="875" font-size="11" fill="#666">
      <tspan font-weight="bold">Caracteristicas Clave:</tspan>
    </text>
    <text x="60" y="890" font-size="10" fill="#666">
      Trazabilidad End-to-End - Motor Inteligente de Stock - Arquitectura Multi-Tenant - Implementacion Rapida
    </text>
  </g>
</svg>