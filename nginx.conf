server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Assets con hash en el nombre → caché agresivo (1 año)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy reverso → backend (reescribe /api/* a /RipserApp/api/*)
    # El frontend hace peticiones a /api/*; nginx las redirige al backend.
    location /api/ {
        proxy_pass         http://76.13.161.228:8080/RipserApp/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pasar headers de autenticación y multi-tenant al backend
        proxy_set_header   Authorization   $http_authorization;
        proxy_set_header   X-Empresa-Id    $http_x_empresa_id;
        proxy_set_header   X-Sucursal-Id   $http_x_sucursal_id;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # SPA fallback: cualquier ruta desconocida sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
